<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBear Reflect - Automation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="top-header">
    <div class="logo-area">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4H12V12H4V4Z" fill="#1C3FAA"/>
        <path d="M12 12H20V20H12V12Z" fill="#1C3FAA"/>
        <path d="M4 16H8V20H4V16Z" fill="#78909C"/>
        <path d="M16 4H20V8H16V4Z" fill="#78909C"/>
      </svg>
      <div class="logo-text">
        <span class="brand-name">SMARTBEAR</span>
        <span class="app-name">Reflect</span>
      </div>
    </div>

    <div class="header-right">
      <div class="project-selector">
        <span class="project-dot"></span>
        <span class="project-name">Kinesis Money</span>
        <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <button class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Setup Wizard / Steps Banner -->
  <div class="steps-banner">
    <span class="banner-title">Welcome, QA Team! Get going in four easy steps:</span>
    <div class="banner-steps">
      <div class="step active"><span class="step-num">1</span> Create a test</div>
      <div class="step"><span class="step-num">2</span> Link to Zephyr</div>
      <div class="step"><span class="step-num">3</span> Define global fallbacks</div>
      <div class="step"><span class="step-num">4</span> Run automation</div>
    </div>
  </div>

  <div class="main-layout">
    
    <!-- Left Navigation Sidebar -->
    <aside class="sidebar">
      <nav class="nav-menu">
        <a href="#tests" class="nav-item active" data-tab="tests">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          <span class="nav-label">Tests</span>
        </a>
        <a href="#suites" class="nav-item" data-tab="suites">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="nav-label">Suites</span>
        </a>
        <a href="#runs" class="nav-item" data-tab="runs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
          </svg>
          <span class="nav-label">Runs</span>
        </a>
        <a href="#globals" class="nav-item" data-tab="globals">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="nav-label">Globals</span>
        </a>
      </nav>
    </aside>

    <!-- Content Workspace -->
    <main class="workspace" id="workspace-root">
      <!-- Dynamic Views Injected Here -->
    </main>

  </div>

  <!-- Create Test Modal -->
  <div class="modal-overlay" id="test-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Create New Test Case</h3>
        <button class="close-btn" onclick="closeModal('test-modal')">&times;</button>
      </div>
      <form id="create-test-form">
        <div class="form-group">
          <label for="test-name">Test Name</label>
          <input type="text" id="test-name" required placeholder="e.g., KMS Signup to Salesforce Flow">
        </div>
        <div class="form-group">
          <label for="test-url">Start URL</label>
          <input type="url" id="test-url" required placeholder="https://qa3-kms.kinesis.money/signup">
        </div>
        <div class="form-group">
          <label for="zephyr-id">Zephyr Case ID Link</label>
          <input type="text" id="zephyr-id" required placeholder="e.g., SFT-T74">
        </div>
        <div class="form-group">
          <label for="test-suite">Suite / Folder</label>
          <select id="test-suite">
            <option value="All Tests">All Tests</option>
            <option value="Signup Flow">Signup Flow</option>
            <option value="Salesforce Integration">Salesforce Integration</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn secondary" onclick="closeModal('test-modal')">Cancel</button>
          <button type="submit" class="btn primary">Create Test</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create Variable Modal -->
  <div class="modal-overlay" id="var-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Add Master Element / Variable</h3>
        <button class="close-btn" onclick="closeModal('var-modal')">&times;</button>
      </div>
      <form id="create-var-form">
        <div class="form-group">
          <label for="var-name">Variable / Selector Key</label>
          <input type="text" id="var-name" required placeholder="e.g., login_button">
        </div>
        <div class="form-group">
          <label for="var-desc">Description</label>
          <input type="text" id="var-desc" placeholder="What is this element used for?">
        </div>
        <div class="form-group">
          <label>Selector Fallbacks (Ordered by Priority)</label>
          <div id="fallbacks-container">
            <div class="fallback-row">
              <span class="fallback-num">P1</span>
              <input type="text" class="fallback-input" required placeholder="e.g., [data-testid='login-btn']">
            </div>
            <div class="fallback-row">
              <span class="fallback-num">P2</span>
              <input type="text" class="fallback-input" placeholder="e.g., button:has-text('Log In')">
            </div>
            <div class="fallback-row">
              <span class="fallback-num">P3</span>
              <input type="text" class="fallback-input" placeholder="e.g., #root > form > button">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn secondary" onclick="closeModal('var-modal')">Cancel</button>
          <button type="submit" class="btn primary">Add Variable</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
